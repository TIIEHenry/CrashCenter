name: LSPosed Module Release (manual)

# Backfill or re-publish a version to Xposed-Modules-Repo without re-tagging main repo.
# Requires repository secret: XPOSED_REPO_TOKEN (classic PAT, repo scope, SSO authorized)

on:
  workflow_dispatch:
    inputs:
      version_name:
        description: versionName (e.g. 1.0.0)
        required: true
        default: '1.0.0'
      version_code:
        description: versionCode (e.g. 1)
        required: true
        default: '1'

jobs:
  xposed-module-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: refs/tags/v${{ inputs.version_name }}

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build release APK
        run: ./gradlew :app:assembleRelease

      - name: Verify PAT can write releases
        env:
          XPOSED_REPO_TOKEN: ${{ secrets.XPOSED_REPO_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${XPOSED_REPO_TOKEN}" ]; then
            echo "::error::XPOSED_REPO_TOKEN secret is not configured"
            exit 1
          fi
          export GH_TOKEN="${XPOSED_REPO_TOKEN}"
          REPO="Xposed-Modules-Repo/nota.android.crash.xp.app"

          echo "=== Token scopes (classic PAT) ==="
          curl -sI -H "Authorization: Bearer ${GH_TOKEN}" https://api.github.com/user \
            | grep -i '^x-oauth-scopes:' || true

          echo "=== Repo permissions for this token ==="
          gh api "repos/${REPO}" --jq '.permissions'

          PUSH="$(gh api "repos/${REPO}" --jq '.permissions.push')"
          if [ "${PUSH}" != "true" ]; then
            echo "::error::PAT can read ${REPO} but push=false — cannot create Releases."
            echo "Fix: Classic PAT with full **repo** scope (NOT public_repo only)."
            echo "Then SSO Authorize Xposed-Modules-Repo: https://github.com/settings/tokens"
            echo "Ensure CrashCenter secret XPOSED_REPO_TOKEN matches the token you tested locally."
            exit 1
          fi
          echo "PAT write access OK"

      - name: Publish to LSPosed module repository
        env:
          XPOSED_REPO_TOKEN: ${{ secrets.XPOSED_REPO_TOKEN }}
          VERSION: ${{ inputs.version_name }}
          VERSION_CODE: ${{ inputs.version_code }}
        run: |
          set -euo pipefail
          XPOSED_TAG="${VERSION_CODE}-${VERSION}"
          REPO="Xposed-Modules-Repo/nota.android.crash.xp.app"
          APK_PATH="app/build/outputs/apk/release/CrashCenter_v${VERSION}_release.apk"

          scripts/extract-changelog.sh "$VERSION" > release-notes.md
          if [[ ! -s release-notes.md ]]; then
            echo "::error::CHANGELOG.md 中未找到 ## [${VERSION}] 段落"
            exit 1
          fi
          if [[ ! -f "$APK_PATH" ]]; then
            echo "::error::APK not found: $APK_PATH"
            exit 1
          fi

          export GH_TOKEN="${XPOSED_REPO_TOKEN}"

          if gh release view "$XPOSED_TAG" --repo "$REPO" >/dev/null 2>&1; then
            echo "Release $XPOSED_TAG already exists — delete it first to re-upload"
            exit 1
          fi

          echo "Creating LSPosed module release $XPOSED_TAG"
          gh release create "$XPOSED_TAG" \
            --repo "$REPO" \
            --title "$VERSION" \
            --notes-file release-notes.md \
            "$APK_PATH"

          echo "Done: https://github.com/${REPO}/releases/tag/${XPOSED_TAG}"
